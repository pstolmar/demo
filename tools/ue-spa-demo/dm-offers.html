  { cfId:'feature-headless',        percent:50, enddate:`${OFFER_MONTH} 9, 2026`,  effect:'spotlight', accentColor:'#61DAFB' },
  { cfId:'feature-personalization', percent:35, enddate:`${OFFER_MONTH} 18, 2026`, effect:'grayscale', accentColor:'#f59e0b' },
  { cfId:'feature-experimentation', percent:65, enddate:`${OFFER_MONTH} 5, 2026`,  effect:'scanlines', accentColor:'#a78bfa' },
];

/* ── CF fetch ────────────────────────────────────────────────────── */
function fetchCFs() {
  return fetch(PUBLISH + '/graphql/execute.json/global/featurelist?_t=' + Date.now(),
    { headers:{ Accept:'application/json' }, cache:'no-store' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(d => {
      const map = {};
      (d?.data?.homeHeroList?.items || []).forEach(i => { map[i._path.split('/').pop()] = i; });
      return map;
    });
}

/* ── NavBar ──────────────────────────────────────────────────────── */
function NavBar() {
  return h('nav', { className:'navbar' },
    h('div', { className:'navbar-brand' }, '◈ Offers Demo'),
    h('div', { className:'navbar-badge' }, 'Powered by Adobe Dynamic Media'),
  );
}

/* ── Hero ────────────────────────────────────────────────────────── */
function HeroSlide({ slide, isActive }) {
  return h('div', { className:'hero-slide'+(isActive?' active':''), style:{ background:slide.gradient } },
    h('div', { className:'slide-left' },
      h('p', { className:'eyebrow' }, slide.label),
      h('div', { className:'ribbon-wrap' }, h('div', { className:'ribbon' }, h('span', null, 'Save Up To'))),
      h('div', { className:'percent-num' }, `${slide.percent}%`),
      h('p', { className:'slide-tagline' }, `${OFFER_MONTH} savings are here`),
      h('p', { className:'slide-subtext' }, slide.subtext),
      h('button', { className:'cta-btn' }, 'Shop now →'),
    ),
    h('div', { className:'slide-right' },
      h('img', { src:dmUrl(slide, 900), alt:slide.category, loading:isActive?'eager':'lazy' }),
    ),
  );
}
function HeroCarousel({ current, onHoverChange }) {
  return h('div', { className:'hero-carousel', onMouseEnter:()=>onHoverChange(true), onMouseLeave:()=>onHoverChange(false) },
    ...SLIDES.map((s,i) => h(HeroSlide, { key:s.id, slide:s, isActive:i===current })));
}
function SlideIndicators({ current, onChange }) {
  return h('div', { className:'indicators' },
    SLIDES.map((s,i) => h('button', { key:s.id, className:'dot'+(i===current?' active':''), onClick:()=>onChange(i), 'aria-label':`Slide ${i+1}` })));
}
function ThumbnailRow({ current, onChange }) {
  return h('div', { className:'thumb-row' },
    SLIDES.map((s,i) => {
      const active = i===current;
      return h('div', { key:s.id, className:'thumb-card',
        style:{ background:s.gradient, borderColor:active?s.accentColor:'transparent', boxShadow:active?`0 0 0 1px ${s.accentColor}40,0 8px 24px rgba(0,0,0,.4)`:'0 4px 16px rgba(0,0,0,.3)' },
        onClick:()=>onChange(i) },
        h('img', { src:dmUrl(s,320), alt:s.label, loading:'lazy' }),
        h('div', { className:'thumb-label' }, s.label),
      );
    })
  );
}

/* ── Sweep card ──────────────────────────────────────────────────── */
function SweepCard({ offerA, offerB, urlA:rawA, urlB:rawB, badge='Variant A', color='#1a6fd4', hint='← sweep to compare →' }) {
  const cardRef = useRef(null);
  const [pct, setPct]           = useState(50);
  const [hovering, setHovering] = useState(false);
  const onMouseMove = useCallback((e) => {
    if (!cardRef.current) return;
    const rect = cardRef.current.getBoundingClientRect();
    setPct(Math.round(Math.max(2, Math.min(98, (e.clientX-rect.left)/rect.width*100))));
  }, []);
  const urlA = rawA || dmUrl({ ...offerA, hideBackground:0 }, 900);
  const urlB = rawB || dmUrl({ ...offerB, hideBackground:0 }, 900);
  return h('div', { ref:cardRef, className:'sweep-card', onMouseMove, onMouseEnter:()=>setHovering(true), onMouseLeave:()=>{ setHovering(false); setPct(50); } },
    h('img', { className:'dm-img', src:urlA, alt:'A', style:{ zIndex:1 } }),
    h('img', { className:'dm-img', src:urlB, alt:'B', style:{ zIndex:2, clipPath:`inset(0 ${100-pct}% 0 0)`, transition:hovering?'none':'clip-path .45s ease' } }),
    hovering && h('div', { className:'sweep-divider', style:{ left:`${pct}%`, zIndex:3 } }, h('div', { className:'sweep-handle' }, '↔')),
    h('div', { className:'sweep-badge', style:{ background:color, zIndex:10 } }, badge),
    h('div', { className:'sweep-variant-label', style:{ zIndex:10 } }, 'sweep to compare'),
    h('div', { className:'sweep-hint', style:{ opacity:hovering?0:1, zIndex:10 } }, hint),
  );
}

/* ── Hover-reveal card ───────────────────────────────────────────── */
function HoverRevealCard({ offer, urlClean:rawClean, urlOffer:rawOffer, badge='Variant B', topLabel, bottomLabel }) {
  const [hovered, setHovered] = useState(false);
  const cleanUrl = rawClean || (offer && dmUrl({ ...offer, hideBackground:1 }, 900));
  const offerUrl = rawOffer || (offer && dmUrl({ ...offer, hideBackground:0 }, 900));
  const topText  = topLabel  || offer?.category || '';
  const botText  = bottomLabel !== undefined ? bottomLabel : (offer ? `${offer.percent}% off · ends ${offer.enddate}` : '');
  return h('div', { className:'reveal-card', onMouseEnter:()=>setHovered(true), onMouseLeave:()=>setHovered(false) },
    h('img', { src:cleanUrl, alt:'Clean', style:{ opacity:hovered?0:1 } }),
    h('img', { src:offerUrl, alt:'Offer', style:{ opacity:hovered?1:0 } }),
    h('div', { className:'reveal-badge' }, badge),
    h('div', { className:'reveal-variant-label' }, 'hover to reveal'),
    topText && h('div', { className:'reveal-top-text', style:{ opacity:hovered?0:1 } }, topText),
    h('div', { className:'reveal-bottom-text', style:{ opacity:hovered?1:0, transform:hovered?'translateY(0)':'translateY(10px)' } },
      botText && h('span', { className:'big-pct' }, botText.split(' ')[0]),
      botText && ' '+botText.split(' ').slice(1).join(' '),
    ),
    h('div', { className:'reveal-hint', style:{ opacity:hovered?0:1 } }, 'hover to reveal →'),
  );
}

/* ── A/B section ─────────────────────────────────────────────────── */
function ABSection() {
  return h('section', { className:'ab-section' },
    h('h2', { className:'ab-heading' }, 'A/B — Dynamic Media interaction variants'),
    h('p', { className:'ab-sub' }, 'Two interaction patterns, two templates. Sweep cards wipe between two full DM renders. Hover cards crossfade between template variants.'),

    h('p', { className:'ab-row-label' }, 'Row 1 — DiscountOffer · 75% Digital Games vs 50% Couch Co-op'),
    h('div', { className:'ab-cards' },
      h(SweepCard, { offerA:GAMES_OFFER, offerB:COUCH_OFFER, badge:'Variant A', color:'#1a6fd4', hint:'← sweep to compare offers →' }),
      h(HoverRevealCard, { offer:COUCH_OFFER, badge:'Variant B' }),
    ),

    h('p', { className:'ab-row-label', style:{ marginTop:'2rem' } }, 'Row 2 — InternationalOffer · DE vs IT sweep · EN→IT hover (Copyfit font-size drama)'),
    h('div', { className:'ab-cards', style:{ justifyContent:'center' } },
      h('div', { style:{ flex:'0 0 420px', maxWidth:'420px' } },
        h(SweepCard, { urlA:INTL_DE, urlB:INTL_IT, badge:'Variant C', color:'#0d9488', hint:'← DE / IT — watch Copyfit handle the Lira price →' }),
      ),
      h('div', { style:{ flex:'0 0 420px', maxWidth:'420px' } },
        h(HoverRevealCard, { urlClean:INTL_EN_FULL, urlOffer:INTL_IT, badge:'Variant D', topLabel:'Adventure Travel Deals', bottomLabel:'' }),
      ),
    ),
  );
}

/* ── Locale section ──────────────────────────────────────────────── */
function LocaleSection() {
  const [locale, setLocale] = useState('en-US');
  const m    = offerMonthForLocale(locale);
  const data = LOCALES[locale](m);
  const imgUrl = dmUrl({ percent:50, image:'PeterStolmarNA001/approved-phone-app', category:data.category, hideBackground:0, enddate:data.enddate }, 900);
  return h('section', { className:'locale-section' },
    h('h2', { className:'ab-heading' }, '🌐 Localization + DM Copyfit'),
    h('p', { className:'ab-sub' }, 'Switch locale — $category and $enddate update live. Copyfit rules automatically resize text so longer strings never overflow.'),
    h('div', { className:'locale-flags' },
      Object.entries(LOCALES).map(([id, fn]) => {
        const d = fn(offerMonthForLocale(id));
        return h('button', { key:id, className:'locale-flag-btn'+(locale===id?' active':''), onClick:()=>setLocale(id) },
          h('span', { className:'flag' }, d.flag), h('span', null, d.label));
      }),
    ),
    h('div', { className:'locale-layout' },
      h('div', { className:'locale-preview' }, h('img', { key:imgUrl, src:imgUrl, alt:locale })),
      h('div', { className:'locale-params' },
        h('p', { className:'params-heading' }, 'Params sent to Dynamic Media:'),
        ...[ ['$percent','50'], ['$category',`"${data.category}"`], ['$enddate',`"${data.enddate}"`], ['Currency',`${data.currency} (${data.symbol})`], ['Headline',`"${data.headline}"`] ].map(([k,v]) =>
          h('div', { key:k, className:'param-row' }, h('span',{className:'param-key'},k), h('span',{className:'param-val'},v))
        ),
        h('p', { className:'copyfit-note' }, 'Copyfit automatically shrinks text that would overflow — no manual size adjustment needed for any language.'),
      ),
    ),
  );
}

/* ── Fade card (InternationalOffer grid, hover for circles) ─────── */
function FadeCard({ cfItem, templateLabel, bgUrl, hoverUrl, delay }) {
  const cardRef = useRef(null);
  const [visible, setVisible] = useState(false);
  const [hovered, setHovered] = useState(false);
  useEffect(() => {
    const el = cardRef.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setTimeout(() => setVisible(true), delay||0); obs.disconnect(); }
    }, { threshold:0.15, rootMargin:'0px 0px -40px 0px' });
    obs.observe(el);
    return () => obs.disconnect();
  }, [delay]);
  const loading = !cfItem;
  return h('div', { ref:cardRef, className:'fade-card'+(visible?' visible':''),
    onMouseEnter:hoverUrl?()=>setHovered(true):undefined,
    onMouseLeave:hoverUrl?()=>setHovered(false):undefined },
    h('div', { className:'fade-card-img-wrap' },
      loading
        ? h('div', { className:'cf-loading-shimmer', style:{ height:'260px' } })
        : h('img', { src:bgUrl, alt:cfItem.title, loading:'lazy' }),
      !loading && hoverUrl && h('img', { src:hoverUrl, alt:'', className:'fade-hover-img', style:{ opacity:hovered?1:0 }, loading:'lazy' }),
    ),
    h('div', { className:'fade-card-label' }, templateLabel),
  );
}

/* ── Effect card + drag-to-reorder row ───────────────────────────── */
function EffectCard({ card, cf, isDragging, isDragOver, onDragStart, onDragOver, onDrop, onDragEnd }) {
  const cardRef = useRef(null);
  const imgUrl = cf ? dmUrl({ percent:card.percent, image:'PeterStolmarNA001/approved-phone-app', category:cf.title, hideBackground:0, enddate:card.enddate }, 900) : null;

  function handleMouseMove(e) {
    if (card.effect !== 'spotlight') return;
    const rect = e.currentTarget.getBoundingClientRect();
    e.currentTarget.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
    e.currentTarget.style.setProperty('--my', (e.clientY - rect.top) + 'px');
  }
  function handleMouseLeave() {
    if (card.effect === 'spotlight') {
      cardRef.current?.style.setProperty('--mx', '-200px');
      cardRef.current?.style.setProperty('--my', '-200px');
    }
    onDragEnd?.();
  }

  let imgContent;
  if (!imgUrl) {
    imgContent = h('div', { className:'cf-loading-shimmer', style:{ height:'220px' } });
  } else if (card.effect === 'spotlight') {
    imgContent = h('div', { className:'img-stack' },
      h('img', { className:'img-layer-base', src:imgUrl, alt:cf.title, loading:'lazy' }),
      h('img', { className:'img-layer-color', src:imgUrl, alt:'', loading:'lazy' }),
    );
  } else {
    imgContent = h('img', { className:'effect-dm-img', src:imgUrl, alt:cf?.title||'', loading:'lazy' });
  }

  return h('div', {
    ref:cardRef,
    className:`effect-card effect-${card.effect}`+(isDragging?' dragging':'')+(isDragOver?' drag-over':''),
    style:{ '--accent':card.accentColor },
    draggable:true,
    onDragStart, onDragOver, onDrop, onDragEnd,
    onMouseMove:handleMouseMove,
    onMouseLeave:handleMouseLeave,
  },
    imgContent,
    h('div', { className:'effect-card-meta' },
      h('span', { className:'effect-pct' }, `${card.percent}% off`),
      h('span', { className:'effect-cat' }, cf?.title || '…'),
      h('span', { className:'effect-date' }, `ends ${card.enddate}`),
    ),
    h('span', { className:'effect-drag-hint' }, '⠿ drag to reorder'),
  );
}

function EffectCardsRow({ cfs }) {
  const [order,    setOrder]   = useState([0,1,2]);
  const [dragging, setDragging]= useState(null);
  const [dragOver, setDragOver]= useState(null);
  const drop = (pos) => {
    if (dragging !== null && dragging !== pos) {
      const next = [...order];
      [next[dragging], next[pos]] = [next[pos], next[dragging]];
      setOrder(next);
    }
    setDragging(null); setDragOver(null);
  };
  const endDrag = () => { setDragging(null); setDragOver(null); };
  return h('div', { className:'effect-cards-row' },
    order.map((cardIdx, pos) => h(EffectCard, {
      key:EFFECT_CARDS[cardIdx].cfId,
      card:EFFECT_CARDS[cardIdx], cf:cfs[EFFECT_CARDS[cardIdx].cfId],
      isDragging:dragging===pos, isDragOver:dragOver===pos,
      onDragStart:()=>setDragging(pos),
      onDragOver:(e)=>{ e.preventDefault(); setDragOver(pos); },
      onDrop:()=>drop(pos),
      onDragEnd:endDrag,
    })),
  );
}

/* ── CF × DM section ────────────────────────────────────────────── */
const FADE_CONFIG = [
  { id:'feature-headless',        circle:'yellow', swapText:false, label:'headless CF · hover for yellow circle' },
  { id:'feature-personalization', circle:'purple', swapText:false, label:'personalization CF · hover for purple circle' },
  { id:'feature-experimentation', circle:'blue',   swapText:false, label:'experimentation CF · hover for blue circle' },
];

function CFDMSection() {
  const [cfs, setCfs] = useState({});
  const [err, setErr] = useState(null);
  useEffect(() => { fetchCFs().then(setCfs).catch(e=>setErr(e.message)); }, []);
  const cfExp = cfs['feature-experimentation'];

  return h('section', { className:'cfdm-section' },
    h('h2', { className:'ab-heading' }, 'Content Fragments × Dynamic Media'),
    h('p', { className:'ab-sub' },
      'CF fields flow into DM template params at request time — no image editing needed. ' +
      'Hover the InternationalOffer cards to reveal colored circles. ' +
      'Drag the DiscountOffer cards to reorder. ' +
      (err ? `(CF error: ${err})` : 'Live from AEM publish.'),
    ),

    /* Three InternationalOffer cards — hover reveals different circles */
    h('div', { className:'cfdm-grid' },
      FADE_CONFIG.map((cfg, i) => {
        const cf = cfs[cfg.id];
        return h(FadeCard, {
          key:cfg.id, cfItem:cf,
          templateLabel:cfg.label,
          bgUrl:    cf ? intlUrl(cf, { swapText:cfg.swapText }) : null,
          hoverUrl: cf ? intlUrl(cf, { circle:cfg.circle, swapText:cfg.swapText }) : null,
          delay:i*160,
        });
      }),
    ),

    /* Three DiscountOffer cards with effects — drag to reorder */
    h('p', { className:'two-templates-heading' },
      'Three CFs · three % off · three DM effects — drag to reorder:'),
    h(EffectCardsRow, { cfs }),

    /* feature-experimentation on InternationalOffer — description in $offer (3-line Copyfit) */
    h('p', { className:'two-templates-heading' },
      'Same fragment — description → $offer on InternationalOffer (3-line Copyfit):'),
    h('div', { className:'intl-cf-card' },
      cfExp
        ? h('img', { src:intlUrl(cfExp, {}), alt:'IntlOffer+CF', loading:'lazy' })
        : h('div', { className:'cf-loading-shimmer', style:{ height:'300px' } }),
      h('div', { className:'intl-cf-label' }, 'feature-experimentation · description → $offer · title → $price'),
    ),
  );
}

/* ── Footer ──────────────────────────────────────────────────────── */
function Footer() {
  return h('footer', { className:'footer' }, 'Dynamic Media template params computed at request time — no image editing required.');
}

/* ── App ─────────────────────────────────────────────────────────── */
function App() {
  const [current, setCurrent] = useState(0);
  const [paused,  setPaused]  = useState(false);
  useEffect(() => {
    if (paused) return undefined;
    const id = setInterval(() => setCurrent(p=>(p+1)%SLIDES.length), 5000);
    return () => clearInterval(id);
  }, [paused]);
  return h('div', null,
    h(NavBar),
    h(HeroCarousel, { current, onHoverChange:setPaused }),
    h(SlideIndicators, { current, onChange:setCurrent }),
    h(ThumbnailRow,    { current, onChange:setCurrent }),
    h(ABSection),
    h(LocaleSection),
    h(CFDMSection),
    h(Footer),
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
