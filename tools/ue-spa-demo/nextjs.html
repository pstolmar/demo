<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="urn:adobe:aue:system:aem" content="aem:https://author-p138879-e1741192.adobeaemcloud.com"/>
  <title>Next.js · UE SPA Demo</title>
  <!--
    Next.js App Router — this page lives at app/page.tsx

    // app/page.tsx — Server Component
    import { HeroClient } from './hero-client';

    export default async function Page() {
      const content = await fetch('https://publish-p.../graphql/execute.json/global/hero')
        .then(r => r.json()).then(normalize);            // server-side fetch, no CORS
      return <HeroClient content={content} />;          // hydrated on client
    }

    // app/hero-client.tsx — 'use client'
    'use client';
    export function HeroClient({ content }: { content: HeroContent }) {
      return <section data-aue-resource={RES} ...>...</section>;
    }
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <script src="https://universal-editor-service.adobe.io/cors.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --blue: #0070F3; --ink: #111; --muted: #666; --line: #eaeaea; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #fff; color: var(--ink); min-height: 100vh; }

    .next-nav {
      position: sticky; top: 0; z-index: 50;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 64px;
      background: rgba(255,255,255,.85); backdrop-filter: blur(12px) saturate(180%);
      border-bottom: 1px solid var(--line);
    }
    .next-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: .9375rem; color: var(--ink); text-decoration: none; }
    .next-logo { width: 22px; height: 22px; background: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .next-logo svg { width: 13px; height: 13px; }
    .next-nav nav { display: flex; align-items: center; gap: 4px; }
    .next-nav nav a {
      padding: 6px 12px; border-radius: 6px; text-decoration: none;
      font-size: .875rem; font-weight: 500; color: var(--muted);
      transition: color .15s, background .15s;
    }
    .next-nav nav a:hover { color: var(--ink); background: #f5f5f5; }
    .next-nav .deploy-btn {
      margin-left: 8px; padding: 7px 14px; border-radius: 6px;
      background: var(--ink); color: #fff;
      font-size: .8125rem; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    .next-nav .deploy-btn:hover { background: #333; }

    .breadcrumb {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 24px; border-bottom: 1px solid var(--line);
      font-size: .8125rem; color: var(--muted);
    }
    .breadcrumb a { color: var(--muted); text-decoration: none; }
    .breadcrumb a:hover { color: var(--blue); }
    .breadcrumb span { color: #ccc; }
    .breadcrumb .current { color: var(--ink); font-weight: 500; }

    /* Server / Client boundary callout */
    .rsc-label {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; border-radius: 4px;
      font-size: .7rem; font-weight: 700; font-family: 'Courier New', monospace;
      letter-spacing: .03em;
    }
    .rsc-server { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .rsc-client { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .hero {
      display: grid; grid-template-columns: 1.05fr .95fr;
      min-height: calc(100vh - 113px);
    }

    .hero-media { position: relative; overflow: hidden; background: #f5f5f5; }
    .hero-media img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: grayscale(1) contrast(1.05);
      transition: filter .6s ease;
    }
    .hero-media:hover img { filter: grayscale(0) contrast(1); }
    .hover-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 6px;
      background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
      border: 1px solid var(--line);
      font-size: .75rem; color: var(--muted); font-weight: 500;
      pointer-events: none;
      transition: opacity .3s;
    }
    .hero-media:hover .hover-hint { opacity: 0; }
    .sc-badge {
      position: absolute; top: 16px; left: 16px;
    }

    .hero-content {
      padding: clamp(40px,6vw,88px);
      display: flex; flex-direction: column; justify-content: center; gap: 24px;
      border-left: 1px solid var(--line);
    }
    .eyebrow { font-size: .75rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--blue); }
    h1 {
      font-size: clamp(2.25rem,4vw,3.75rem); font-weight: 900;
      line-height: .95; letter-spacing: -.04em; color: var(--ink);
    }

    /* App component — Next.js Client Component */
    .client-component {
      border: 1.5px dashed rgba(0,112,243,.3); border-radius: 8px;
      padding: 16px 18px; position: relative;
      background: rgba(0,112,243,.02);
    }
    .client-component::before {
      content: "'use client' — <DeployStatus />"; position: absolute; top: -11px; left: 12px;
      font-size: .65rem; font-family: 'Courier New', monospace; font-weight: 700;
      background: #fff; padding: 0 6px; color: var(--blue);
    }
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .status-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; }
    .status-dot.green { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
    .status-dot.blue { background: var(--blue); }
    .status-dot.amber { background: #f59e0b; }
    .status-val { font-size: .875rem; font-weight: 700; color: var(--ink); }
    .status-lbl { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .status-divider { width: 1px; height: 36px; background: var(--line); }

    .description { font-size: 1rem; line-height: 1.7; color: var(--muted); }

    .cta-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .cta-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 22px; border-radius: 6px;
      background: var(--ink); color: #fff;
      font-weight: 600; font-size: .9375rem; text-decoration: none;
      transition: background .15s;
    }
    .cta-primary:hover { background: #333; }
    .cta-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 11px 22px; border-radius: 6px;
      border: 1px solid var(--line); color: var(--ink);
      font-weight: 600; font-size: .9375rem; text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .cta-secondary:hover { border-color: #999; background: #f9f9f9; }

    @media (max-width: 720px) { .hero { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<nav class="next-nav">
  <a href="#" class="next-brand">
    <div class="next-logo">
      <svg viewBox="0 0 180 180" fill="white"><path d="M90 0C40.3 0 0 40.3 0 90s40.3 90 90 90 90-40.3 90-90S139.7 0 90 0zm-5 52.5h15v75l-37.5-52.5H78v52.5H63V52.5h22z"/></svg>
    </div>
    MyApp · Next.js
  </a>
  <nav>
    <a href="#">Products</a>
    <a href="#">Docs</a>
    <a href="#">Blog</a>
    <a href="#" class="deploy-btn">▲ Deploy</a>
  </nav>
</nav>

<div class="breadcrumb">
  <a href="#">Home</a><span>/</span>
  <a href="#">Pages</a><span>/</span>
  <span class="current">Hero · Universal Editor Demo</span>
</div>

<div id="root"><p style="padding:32px;opacity:.4">Loading Next.js…</p></div>

<script>
  /* Next.js App Router — server-rendered shell, hydrated client component */
  const RES = 'urn:aem:/content/dam/ue-demo/fragments/home-hero/jcr:content/data/master';
  const FB = {
    eyebrow: 'Next.js · AEM Demo', title: 'Editable from AEM',
    description: 'This SPA renders Universal Editor annotations so authors can edit fields in context.',
    ctaLabel: 'Read the docs',
    image: 'https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80',
  };

  function esc(v) {
    return String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render(content) {
    const r = esc(RES);
    document.getElementById('root').innerHTML = `
      <section class="hero"
        data-aue-resource="${r}" data-aue-type="component"
        data-aue-label="Hero CF" data-aue-model="hero">

        <div class="hero-media">
          <div class="sc-badge">
            <span class="rsc-label rsc-server">▪ Server Component</span>
          </div>
          <img src="${esc(content.image)}" alt=""
            data-aue-resource="${r}" data-aue-prop="contentReference"
            data-aue-type="image" data-aue-label="Hero Image"/>
          <div class="hover-hint">Hover to reveal color</div>
        </div>

        <div class="hero-content">
          <p class="eyebrow"
            data-aue-resource="${r}" data-aue-prop="eyebrow"
            data-aue-type="text" data-aue-label="Eyebrow">${esc(content.eyebrow)}</p>

          <h1 data-aue-resource="${r}" data-aue-prop="title"
              data-aue-type="text" data-aue-label="Title">${esc(content.title)}</h1>

          <div class="client-component">
            <div class="status-row">
              <div class="status-item">
                <div class="status-dot green"></div>
                <div class="status-val">Ready</div>
                <div class="status-lbl">Edge network</div>
              </div>
              <div class="status-divider"></div>
              <div class="status-item">
                <div class="status-dot blue"></div>
                <div class="status-val">99.98%</div>
                <div class="status-lbl">Uptime</div>
              </div>
              <div class="status-divider"></div>
              <div class="status-item">
                <div class="status-dot amber"></div>
                <div class="status-val">42ms</div>
                <div class="status-lbl">TTFB</div>
              </div>
            </div>
          </div>

          <p class="description"
            data-aue-resource="${r}" data-aue-prop="description"
            data-aue-type="richtext" data-aue-label="Description">${esc(content.description)}</p>

          <div class="cta-row">
            <a class="cta-primary" href="#more"
              data-aue-resource="${r}" data-aue-prop="ctaLabel"
              data-aue-type="text" data-aue-label="CTA">
              ${esc(content.ctaLabel)} →
            </a>
            <a class="cta-secondary" href="#">View on GitHub</a>
          </div>
        </div>
      </section>`;
  }

  (async () => {
    try {
      const res = await fetch('https://publish-p138879-e1741192.adobeaemcloud.com/graphql/execute.json/global/hero?_v=' + Date.now(), { headers: { Accept: 'application/json' } });
      const d = await res.json();
      const item = d?.data?.homeHeroByPath?.item || d;
      render({ ...FB, ...item,
        image: item?.contentReference?._publishUrl || item?.contentReference?._path || item?.image || FB.image,
        description: item?.description?.plaintext || item?.description?.html || item?.description || FB.description,
      });
    } catch {
      render(FB);
    }
  })();
</script>
</body>
</html>
