<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="urn:adobe:aue:system:aem" content="aem:https://author-p138879-e1741192.adobeaemcloud.com"/>
  <title>CF Live · AEM + React</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet"/>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://universal-editor-service.adobe.io/cors.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --cyan: #61DAFB; --navy: #20232a; --mid: #282c34; --card: #2c313a; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--navy); color: #fff; min-height: 100vh; }

    /* Confetti overlay */
    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; }

    /* Hero */
    .hero {
      display: grid; grid-template-columns: 1fr 1fr;
      min-height: 56vh; align-items: center;
      padding: 64px 72px; position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 65% 50%, rgba(97,218,251,.08) 0%, transparent 60%);
    }
    .hero-text { position: relative; z-index: 2; }
    .hero-eyebrow {
      font-size: .68rem; font-weight: 700; letter-spacing: .16em;
      text-transform: uppercase; color: var(--cyan); margin-bottom: 18px;
    }
    .hero-title {
      font-size: clamp(2rem, 4.5vw, 3.25rem); font-weight: 900;
      line-height: 1.08; margin-bottom: 22px;
    }
    .hero-title em { font-style: normal; color: var(--cyan); }
    .hero-sub {
      font-size: .95rem; color: rgba(255,255,255,.55);
      line-height: 1.65; max-width: 400px;
    }
    .hero-visual {
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    #globe-canvas {
      width: 320px; height: 320px;
      filter: drop-shadow(0 0 48px rgba(97,218,251,.28));
    }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 72px;
      background: rgba(0,0,0,.25);
      border-top: 1px solid rgba(97,218,251,.07);
      border-bottom: 1px solid rgba(97,218,251,.07);
      font-size: .78rem; color: rgba(255,255,255,.45);
    }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
      50%       { opacity: .5; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }
    .status-bar button {
      margin-left: auto; padding: 5px 16px; border-radius: 6px;
      border: 1px solid rgba(97,218,251,.3);
      background: rgba(97,218,251,.1); color: var(--cyan);
      font: 600 .75rem 'Inter', system-ui; cursor: pointer;
      transition: background .15s;
    }
    .status-bar button:hover { background: rgba(97,218,251,.22); }
    .status-err { color: #fc8181; }

    /* Cards */
    .cards-section { padding: 48px 72px 80px; }
    .section-label {
      font-size: .62rem; font-weight: 700; letter-spacing: .14em;
      text-transform: uppercase; color: rgba(97,218,251,.45); margin-bottom: 28px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }
    .cf-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 14px; padding: 30px;
      transition: border-color .2s, transform .25s;
    }
    .cf-card:hover { border-color: rgba(97,218,251,.22); transform: translateY(-3px); }
    .cf-eyebrow {
      font-size: .6rem; font-weight: 700; letter-spacing: .13em;
      text-transform: uppercase; color: rgba(97,218,251,.45); margin-bottom: 10px;
    }
    .cf-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
    .cf-body  { font-size: .875rem; color: rgba(255,255,255,.55); line-height: 1.65; }
    .cf-skeleton { color: rgba(255,255,255,.2); font-size: .85rem; padding: 8px 0; }

    /* Balloon */
    .balloon-wrap {
      position: fixed; bottom: 36px; right: 36px; z-index: 50;
      cursor: pointer; user-select: none;
      animation: float 3.2s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .balloon-wrap:hover { filter: brightness(1.15); }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%       { transform: translateY(-14px) rotate(2deg); }
    }
    .balloon-wrap.popped { animation: pop .35s forwards; }
    @keyframes pop {
      0%   { transform: scale(1); opacity: 1; }
      60%  { transform: scale(1.5); opacity: .6; }
      100% { transform: scale(0);   opacity: 0; }
    }
    .balloon-body {
      width: 56px; height: 70px; border-radius: 50%;
      position: relative;
    }
    .balloon-body::after {
      content: ''; position: absolute;
      top: 12px; left: 14px;
      width: 10px; height: 16px;
      background: rgba(255,255,255,.35);
      border-radius: 50%; transform: rotate(-40deg);
    }
    .balloon-tip {
      width: 0; height: 0; margin: 0 auto;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
    }
    .balloon-string {
      width: 1px; height: 56px; background: rgba(255,255,255,.3);
      margin: 0 auto;
    }
    .balloon-hint {
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      font-size: .6rem; color: rgba(255,255,255,.35);
      white-space: nowrap; margin-bottom: 4px;
      opacity: 0; transition: opacity .2s;
    }
    .balloon-wrap:hover .balloon-hint { opacity: 1; }

    @media (max-width: 720px) {
      .hero { grid-template-columns: 1fr; padding: 40px 24px; }
      .hero-visual { margin-top: 32px; }
      #globe-canvas { width: 220px; height: 220px; }
      .status-bar, .cards-section { padding-left: 24px; padding-right: 24px; }
    }
  </style>
</head>
<body>
<canvas id="confetti-canvas"></canvas>
<div id="root"></div>

<script>
/* ── Globe (Fibonacci sphere, canvas) ─────────────────────────────── */
(function () {
  const DPR = Math.min(devicePixelRatio || 1, 2);
  const SIZE = 320;
  const cv = document.createElement('canvas');
  cv.id = 'globe-canvas';
  cv.width = SIZE * DPR; cv.height = SIZE * DPR;
  cv.style.width = SIZE + 'px'; cv.style.height = SIZE + 'px';
  window.__globeCanvas = cv;

  const ctx = cv.getContext('2d');
  ctx.scale(DPR, DPR);
  let rot = 0;

  const N = 420, pts = [];
  const PHI = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < N; i++) {
    const y = 1 - (i / (N - 1)) * 2, r = Math.sqrt(1 - y * y), t = PHI * i;
    pts.push([Math.cos(t) * r, y, Math.sin(t) * r]);
  }

  function project([x, y, z], ry) {
    const c = Math.cos(ry), s = Math.sin(ry);
    const rx = x * c - z * s, rz = x * s + z * c;
    const sc = 128 / (2.8 - rz);
    return { sx: SIZE / 2 + rx * sc, sy: SIZE / 2 + y * sc, d: (rz + 1) / 2 };
  }

  (function frame() {
    ctx.clearRect(0, 0, SIZE, SIZE);
    const g = ctx.createRadialGradient(SIZE/2, SIZE/2, 10, SIZE/2, SIZE/2, SIZE/2);
    g.addColorStop(0, 'rgba(97,218,251,.07)'); g.addColorStop(1, 'rgba(97,218,251,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, SIZE, SIZE);

    pts.map(p => ({ p: project(p, rot), raw: p }))
       .sort((a, b) => a.p.d - b.p.d)
       .forEach(({ p: { sx, sy, d } }) => {
         ctx.beginPath();
         ctx.arc(sx, sy, d * 2.6 + 0.4, 0, 6.283);
         ctx.fillStyle = 'rgba(97,218,251,' + (d * 0.72 + 0.1).toFixed(2) + ')';
         ctx.fill();
       });
    rot += 0.0035;
    requestAnimationFrame(frame);
  })();
})();

/* ── Confetti ─────────────────────────────────────────────────────── */
const CC = document.getElementById('confetti-canvas');
function resizeCC() { CC.width = innerWidth; CC.height = innerHeight; }
resizeCC(); addEventListener('resize', resizeCC);
let particles = [], rafCC = null;
const PALETTE = ['#61DAFB','#FF6B6B','#FFE66D','#A8FF78','#FF8E53','#C471ED','#FF6B9D'];

function launchConfetti(x, y) {
  const ox = x ?? innerWidth / 2, oy = y ?? innerHeight * .4;
  for (let i = 0; i < 130; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = Math.random() * 9 + 2;
    particles.push({
      x: ox, y: oy, vx: Math.cos(a) * v * .6, vy: Math.sin(a) * v - 4,
      rot: Math.random() * 360, vrot: (Math.random() - .5) * 12,
      w: Math.random() * 11 + 6, h: Math.random() * 6 + 4,
      color: PALETTE[Math.floor(Math.random() * PALETTE.length)], life: 1,
    });
  }
  if (!rafCC) tickCC();
}

function tickCC() {
  const ctx = CC.getContext('2d');
  ctx.clearRect(0, 0, CC.width, CC.height);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.rot += p.vrot; p.life -= 0.012;
    ctx.save();
    ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  });
  particles = particles.filter(p => p.life > 0);
  rafCC = particles.length ? requestAnimationFrame(tickCC) : null;
}

/* ── React SPA ────────────────────────────────────────────────────── */
const { useState, useEffect, useRef, useCallback, createElement: h } = React;
const PUBLISH = 'https://publish-p138879-e1741192.adobeaemcloud.com';
const CF_IDS  = ['feature-headless', 'feature-personalization', 'feature-experimentation'];
const POLL_MS = 10000;
const BALLOON_COLORS = ['#FF6B9D','#FF6B6B','#FFE66D','#61DAFB','#C471ED','#A8FF78'];

function cfRes(id) {
  return 'urn:aem:/content/dam/ue-demo/fragments/' + id + '/jcr:content/data/master';
}
function fetchCFs() {
  return fetch(
    PUBLISH + '/graphql/execute.json/global/featurelist?_t=' + Date.now(),
    { headers: { Accept: 'application/json' }, cache: 'no-store' }
  ).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
   .then(d => {
     const map = {};
     (d?.data?.homeHeroList?.items || []).forEach(i => { map[i._path.split('/').pop()] = i; });
     return map;
   });
}

function Card({ id, cf }) {
  const res = cfRes(id);
  return h('div', {
    className: 'cf-card',
    'data-aue-resource': res, 'data-aue-type': 'component',
    'data-aue-label': cf?.title || id, 'data-aue-model': 'hero',
  },
    h('p',  { className: 'cf-eyebrow', 'data-aue-resource': res, 'data-aue-prop': 'eyebrow',     'data-aue-type': 'text',     'data-aue-label': 'Eyebrow'     }, cf?.eyebrow || '—'),
    h('h3', { className: 'cf-title',   'data-aue-resource': res, 'data-aue-prop': 'title',        'data-aue-type': 'text',     'data-aue-label': 'Title'        }, cf?.title   || id),
    h('p',  { className: 'cf-body',    'data-aue-resource': res, 'data-aue-prop': 'description',  'data-aue-type': 'richtext', 'data-aue-label': 'Description'  }, cf?.description?.plaintext || '')
  );
}

function GlobeSlot() {
  const ref = useRef(null);
  useEffect(() => { if (ref.current && window.__globeCanvas) ref.current.appendChild(window.__globeCanvas); }, []);
  return h('div', { ref, className: 'hero-visual' });
}

function Balloon() {
  const [popped,  setPopped]  = useState(false);
  const [colorIdx, setColorIdx] = useState(0);

  function pop(e) {
    if (popped) return;
    setPopped(true);
    launchConfetti(e.clientX, e.clientY);
    setTimeout(() => { setColorIdx(i => (i + 1) % BALLOON_COLORS.length); setPopped(false); }, 1400);
  }

  const color = BALLOON_COLORS[colorIdx];
  const dark  = color + 'cc';
  return h('div', { className: 'balloon-wrap' + (popped ? ' popped' : ''), onClick: pop },
    h('span', { className: 'balloon-hint' }, 'pop me'),
    h('div', {
      className: 'balloon-body',
      style: { background: 'radial-gradient(circle at 35% 32%, ' + color + ', ' + dark + ')' },
    }),
    h('div', { className: 'balloon-tip',    style: { borderTop: '9px solid ' + dark } }),
    h('div', { className: 'balloon-string' })
  );
}

function App() {
  const [cfs,     setCfs]     = useState(null);
  const [err,     setErr]     = useState(null);
  const [fetched, setFetched] = useState('—');
  const prevSig = useRef('');

  const load = useCallback((manual) => {
    fetchCFs()
      .then(map => {
        const sig = JSON.stringify(map);
        if (manual) launchConfetti();
        if (sig !== prevSig.current) { prevSig.current = sig; setCfs(map); }
        setErr(null); setFetched(new Date().toLocaleTimeString());
      })
      .catch(e => setErr(e.message));
  }, []);

  useEffect(() => {
    load(false);
    const t = setInterval(() => load(false), POLL_MS);
    return () => clearInterval(t);
  }, [load]);

  return h('div', null,
    // Hero
    h('section', { className: 'hero' },
      h('div', { className: 'hero-text' },
        h('p', { className: 'hero-eyebrow' }, 'AEM Content Fragments · React · Universal Editor'),
        h('h1', { className: 'hero-title' }, 'Author once, ', h('br'), h('em', null, 'live everywhere.')),
        h('p', { className: 'hero-sub' },
          'Edit a Content Fragment in Universal Editor. Within seconds every visitor sees the update — no rebuild, no redeploy, no stale cache.')
      ),
      h(GlobeSlot, null)
    ),
    // Status
    h('div', { className: 'status-bar' },
      h('div', { className: 'pulse' }),
      'Polling AEM every ' + (POLL_MS / 1000) + 's · last: ' + fetched,
      err ? h('span', { className: 'status-err' }, ' · ' + err) : null,
      h('button', { onClick: () => load(true), title: 'Refresh now', style: { display: 'flex', alignItems: 'center', gap: '6px' } },
      h('svg', { xmlns: 'http://www.w3.org/2000/svg', viewBox: '0 0 18 18', width: '13', height: '13', fill: 'currentColor', 'aria-hidden': 'true' },
        h('path', { d: 'M9 2.5A6.5 6.5 0 1 0 15.465 6H13.5a4.5 4.5 0 1 1-.9-2.685L11.086 4.83A.5.5 0 0 0 11.5 5.5H16a.5.5 0 0 0 .5-.5V.5a.5.5 0 0 0-.854-.354l-1.452 1.452A8 8 0 1 1 9 1a.75.75 0 0 1 0 1.5z' })
      ),
      'Refresh'
    )
    ),
    // Cards
    h('section', { className: 'cards-section' },
      h('p', { className: 'section-label' }, 'Content Fragments — live from AEM publish'),
      h('div', { className: 'cards-grid' },
        cfs === null
          ? CF_IDS.map(id => h('div', { key: id, className: 'cf-card' }, h('p', { className: 'cf-skeleton' }, 'Fetching…')))
          : CF_IDS.map(id => h(Card, { key: id, id, cf: cfs[id] }))
      )
    ),
    h(Balloon, null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
