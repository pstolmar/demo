function latLng(lat, lng, r = 2.05) {
  const phi   = (90 - lat) * (Math.PI / 180);
  const theta = (lng + 180) * (Math.PI / 180);
  return [
    -(r * Math.sin(phi) * Math.cos(theta)),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta),
  ];
}

// ── Shared: OrbitControls ────────────────────────────────────────────────────
function OrbitalControls({ minDist = 3, maxDist = 10 }) {
  const { camera, gl } = useThree();
  const ref = useRef();
  useEffect(() => {
    ref.current = new OrbitControls(camera, gl.domElement);
    ref.current.enableDamping    = true;
    ref.current.dampingFactor    = 0.05;
    ref.current.rotateSpeed      = 0.5;
    ref.current.minDistance      = minDist;
    ref.current.maxDistance      = maxDist;
    return () => ref.current.dispose();
  }, []);
  useFrame(() => ref.current?.update());
  return null;
}

// ── Shared: star field ────────────────────────────────────────────────────────
function Stars({ count = 2000 }) {
  const { geo } = useMemo(() => {
    const pos = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i += 3) {
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);
      const r     = 60 + Math.random() * 60;
      pos[i]   = r * Math.sin(phi) * Math.cos(theta);
      pos[i+1] = r * Math.sin(phi) * Math.sin(theta);
      pos[i+2] = r * Math.cos(phi);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    return { geo: g };
  }, [count]);
  return h('points', { geometry: geo },
    h('pointsMaterial', { color: '#ffffff', size: 0.18, sizeAttenuation: true, transparent: true, opacity: 0.7 })
  );
}

// Procedural Earth — always loads instantly, replaced by photo if URL succeeds
function makeEarthCanvas() {
  const W = 1024, H = 512;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Equirectangular coordinate helper
  const p = (lng, lat) => [(lng + 180) / 360 * W, (90 - lat) / 180 * H];
  function land(pts, fill) {
    ctx.beginPath();
    ctx.moveTo(...p(...pts[0]));
    for (let i = 1; i < pts.length; i++) ctx.lineTo(...p(...pts[i]));
    ctx.closePath();
    ctx.fillStyle = fill; ctx.fill();
  }

  // Ocean base
  ctx.fillStyle = '#06173a'; ctx.fillRect(0, 0, W, H);
  const og = ctx.createLinearGradient(0, 0, 0, H);
  og.addColorStop(0, 'rgba(10,40,100,.4)'); og.addColorStop(.5, 'rgba(15,55,140,.2)'); og.addColorStop(1, 'rgba(5,20,70,.4)');
  ctx.fillStyle = og; ctx.fillRect(0, 0, W, H);

  const F='#2e6828', G='#4a8038', D='#b8722a', T='#5e6e52', I='#d4e8f8', M='#6a685a';

  // North America
  land([[-167,72],[-140,70],[-80,74],[-64,62],[-55,47],[-66,44],[-70,41],[-76,35],[-80,25],[-87,16],[-92,16],[-105,20],[-117,30],[-117,33],[-122,37],[-124,49],[-130,55],[-140,58],[-155,60],[-165,63]], G);
  land([[-118,33],[-104,28],[-100,32],[-108,37],[-118,37]], D); // SW desert
  land([[-104,50],[-90,48],[-90,35],[-100,32],[-104,36]], '#7ea050'); // Great Plains
  // Greenland
  land([[-72,60],[-52,59],[-17,65],[-17,77],[-42,83],[-65,83],[-72,78]], I);

  // South America
  land([[-80,12],[-67,12],[-60,5],[-50,-1],[-35,-5],[-35,-15],[-40,-23],[-48,-28],[-53,-34],[-68,-56],[-75,-50],[-80,-40],[-75,-15],[-80,-5]], G);
  land([[-74,0],[-50,0],[-48,-10],[-58,-15],[-75,-10]], F); // Amazon
  land([[-73,-25],[-65,-24],[-65,-39],[-73,-39]], D); // Atacama

  // Europe
  land([[-10,36],[3,36],[15,37],[28,36],[36,37],[42,40],[35,43],[38,43],[42,46],[32,47],[26,49],[25,55],[22,57],[10,56],[5,58],[-4,57],[-8,52],[-4,44],[-10,44]], G);
  land([[5,57],[10,58],[20,64],[28,70],[25,71],[15,70],[5,63]], T); // Scandinavia
  land([[-9,44],[-1,44],[3,40],[0,37],[-7,36],[-9,38]], D); // Iberia

  // Africa
  land([[-17,36],[10,38],[32,36],[42,13],[51,12],[52,2],[42,-12],[36,-18],[33,-35],[18,-35],[16,-29],[12,-18],[8,4],[0,6],[-5,10],[-17,15]], G);
  land([[-5,36],[35,36],[35,18],[25,18],[10,18],[-5,22]], D); // Sahara
  land([[-5,22],[25,18],[35,18],[35,10],[25,10],[10,10],[-5,14]], '#a08030'); // Sahel
  land([[10,4],[28,4],[28,-5],[16,-5],[10,0]], F); // Congo
  land([[16,-22],[30,-22],[30,-32],[18,-32]], D); // Kalahari

  // Asia (main body)
  land([[40,38],[58,38],[65,24],[72,18],[80,10],[102,10],[110,18],[122,26],[130,32],[140,42],[145,48],[140,55],[145,62],[135,68],[115,72],[100,76],[80,74],[60,70],[40,65],[32,60],[26,50],[32,47],[42,46],[40,38]], G);
  land([[58,48],[85,48],[90,42],[75,36],[60,36]], D); // Central Asia
  land([[65,62],[105,68],[140,66],[135,72],[100,76],[80,74],[65,70]], T); // Siberia
  land([[85,46],[110,48],[115,42],[105,38],[85,40]], D); // Gobi
  land([[36,30],[56,22],[58,14],[44,12],[38,16],[36,22]], D); // Arabia
  land([[65,24],[72,24],[80,18],[80,8],[77,6],[72,18]], F); // India
  land([[95,28],[105,24],[108,16],[106,2],[100,4],[96,18]], G); // SE Asia

  // Japan
  land([[130,32],[132,35],[136,36],[136,34],[132,32]], G);
  land([[130,43],[132,43],[136,36],[132,36],[128,42]], T);

  // SE Asia islands
  land([[108,4],[118,6],[118,-2],[114,-4],[108,-2]], F); // Borneo
  land([[96,5],[106,2],[106,-6],[96,-4],[95,2]], F); // Sumatra
  land([[131,-2],[150,-6],[148,-8],[131,-8]], F); // New Guinea

  // Australia
  land([[114,-22],[118,-20],[122,-18],[130,-14],[136,-12],[142,-12],[150,-22],[154,-28],[152,-38],[144,-38],[136,-36],[125,-34],[114,-30]], D);
  land([[148,-38],[154,-28],[154,-22],[150,-20],[144,-20],[144,-36]], G); // E coast
  land([[166,-46],[172,-46],[172,-34],[168,-35],[166,-40]], G); // NZ

  // Ice caps
  ctx.fillStyle = I; ctx.fillRect(0, H * 0.835, W, H * 0.165); // Antarctica
  ctx.fillStyle = I; ctx.fillRect(0, 0, W, H * 0.04); // Arctic

  // Cloud wisps
  ctx.globalAlpha = 0.28; ctx.fillStyle = '#ffffff';

    ctx.beginPath();
    ctx.ellipse((i / 18 + Math.sin(i * 2.3) * 0.04) * W, H * (0.46 + Math.sin(i * 1.7) * 0.03), 55 + Math.cos(i) * 22, 9, 0, 0, Math.PI * 2);

    ctx.beginPath(); ctx.ellipse(t * W * 1.05, H * (0.71 + Math.sin(i * 1.9) * 0.05), 38 + Math.cos(i * 2.7) * 18, 6, 0, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  return c;
}

function EarthSphere() {
  const groupRef = useRef();
  const [texture, setTexture] = useState(null);
  const dotRefs  = useRef([]);

  useEffect(() => {
    // Show procedural canvas texture immediately
    const canvasTex = new THREE.CanvasTexture(makeEarthCanvas());
    canvasTex.colorSpace = THREE.SRGBColorSpace;
    setTexture(canvasTex);

    // Upgrade to photo texture if URL is reachable
    const loader = new THREE.TextureLoader();
    loader.load(EARTH_TEX,
      (t) => { t.colorSpace = THREE.SRGBColorSpace; setTexture(t); },
      undefined,
      () => loader.load(EARTH_TEX2,
        (t) => { t.colorSpace = THREE.SRGBColorSpace; setTexture(t); },
        undefined,
        () => {} // canvas already set, keep it
      )
    );
  }, []);

  useFrame((state, dt) => {
    if (groupRef.current) groupRef.current.rotation.y += dt * 0.055;
    // Pulse the halo rings
    const t = state.clock.elapsedTime;
    dotRefs.current.forEach((r, i) => {
      if (r?.material) {
        const s = 1 + 0.35 * Math.abs(Math.sin(t * 1.6 + i * 1.1));
        r.scale.setScalar(s);
        r.material.opacity = 0.25 + 0.2 * Math.abs(Math.sin(t * 1.6 + i * 1.1));
      }
    });
  });

  return h('group', { ref: groupRef },
    // Earth surface
    h('mesh', null,
      h('sphereGeometry', { args: [2, 96, 48] }),
      h('meshPhongMaterial', {
        map: texture,
        color: texture ? 0xffffff : '#0d2a5a',
        shininess: 30,
        specular: new THREE.Color(0x111a33),
      })
    ),
    // Atmosphere — inner bright band
    h('mesh', null,
      h('sphereGeometry', { args: [2.03, 48, 48] }),
      h('meshPhongMaterial', {
        color: '#2244ee', transparent: true, opacity: 0.22,
        side: THREE.FrontSide, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    ),
    // Atmosphere — mid haze
    h('mesh', null,
      h('sphereGeometry', { args: [2.14, 32, 32] }),
      h('meshPhongMaterial', {
        color: '#3366ff', transparent: true, opacity: 0.10,
        side: THREE.FrontSide, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    ),
    // Atmosphere — outer corona
    h('mesh', null,
      h('sphereGeometry', { args: [2.38, 24, 24] }),
      h('meshPhongMaterial', {
        color: '#5588ff', transparent: true, opacity: 0.045,
        side: THREE.BackSide, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    ),
    // Data center dots
    ...DCS.map((dc, i) =>
      h('mesh', { key: i, position: latLng(dc.lat, dc.lng) },
        h('sphereGeometry', { args: [0.05, 12, 12] }),
        h('meshBasicMaterial', { color: dc.color })
      )
    ),
    // Pulsing halo rings
    ...DCS.map((dc, i) =>
      h('mesh', {
          key: `h${i}`, position: latLng(dc.lat, dc.lng),
          ref: el => { dotRefs.current[i] = el; },
        },
        h('sphereGeometry', { args: [0.11, 10, 10] }),
        h('meshBasicMaterial', { color: dc.color, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending, depthWrite: false })
      )
    )
  );
}

// Animated particle that travels along an arc
function ArcParticle({ a, b, offset = 0, speed = 0.18 }) {
  const ref     = useRef();
  const progRef = useRef(offset);
  const pts     = useMemo(() => {
    const from  = new THREE.Vector3(...latLng(DCS[a].lat, DCS[a].lng));
    const to    = new THREE.Vector3(...latLng(DCS[b].lat, DCS[b].lng));
    const mid   = from.clone().add(to).multiplyScalar(0.5).normalize().multiplyScalar(3.5);
    return new THREE.QuadraticBezierCurve3(from, mid, to).getPoints(120);
  }, [a, b]);

  useFrame((_, dt) => {
    progRef.current = (progRef.current + dt * speed) % 1;
    const idx = Math.floor(progRef.current * (pts.length - 1));
    ref.current.position.copy(pts[idx]);
  });

  return h('mesh', { ref },
    h('sphereGeometry', { args: [0.035, 6, 6] }),
    h('meshBasicMaterial', { color: DCS[a].color, blending: THREE.AdditiveBlending, depthWrite: false })
  );
}

function GlobeArc({ a, b }) {
  const obj = useMemo(() => {
    const from  = new THREE.Vector3(...latLng(DCS[a].lat, DCS[a].lng));
    const to    = new THREE.Vector3(...latLng(DCS[b].lat, DCS[b].lng));
    const mid   = from.clone().add(to).multiplyScalar(0.5).normalize().multiplyScalar(3.5);
    const curve = new THREE.QuadraticBezierCurve3(from, mid, to);
    const pts   = curve.getPoints(80);
    const geo   = new THREE.BufferGeometry().setFromPoints(pts);
    const mat   = new THREE.LineBasicMaterial({ color: DCS[a].color, transparent: true, opacity: 0.6 });
    const line  = new THREE.Line(geo, mat);
    return line;
  }, [a, b]);
  return h('primitive', { object: obj });
}

function GlobeScene() {
  return h(React.Fragment, null,
    // Very low ambient so the night side stays dark
    h('ambientLight',     { intensity: 0.10 }),
    // Sun: warm daylight, pulled back from 3.0 so it doesn't blow out the texture
    h('directionalLight', { position: [8, 4, 6],   intensity: 1.6, color: '#ffe8c0' }),
    // Earthshine backfill — faint blue on the night side
    h('pointLight',       { position: [-6,-2,-4],  intensity: 0.15, color: '#1a3a8a' }),
    h(Stars, { count: 3000 }),
    h(EarthSphere, null),
    ...ARC_PAIRS.map(([a, b], i) => h(GlobeArc, { key: i, a, b })),
    // Animated data flow particles along each arc
    ...ARC_PAIRS.flatMap(([a, b], i) => [
      h(ArcParticle, { key: `p0-${i}`, a, b, offset: 0,    speed: 0.16 + i * 0.02 }),
      h(ArcParticle, { key: `p1-${i}`, a, b, offset: 0.5,  speed: 0.16 + i * 0.02 }),
    ]),
    h(OrbitalControls, { minDist: 2.8, maxDist: 9 })
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENE 2: ARCHITECTURE WALKTHROUGH
// ─────────────────────────────────────────────────────────────────────────────

function makeLabel(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 360; canvas.height = 80;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 360, 80);
  ctx.fillStyle = 'rgba(4,10,24,0.86)';
  ctx.strokeStyle = color;
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.roundRect(4, 8, 352, 64, 10); ctx.fill(); ctx.stroke();
  ctx.fillStyle = color;
  ctx.font = 'bold 24px Inter,system-ui,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 180, 40);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sp = new THREE.Sprite(mat);
  sp.scale.set(3.2, 0.71, 1);
  return sp;
}

function ArchEdge({ fromId, toId }) {
  const obj = useMemo(() => {
    const a   = ARCH.find(n => n.id === fromId);
    const b   = ARCH.find(n => n.id === toId);
    const pts = [new THREE.Vector3(...a.pos), new THREE.Vector3(...b.pos)];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color: '#ffffff', transparent: true, opacity: 0.18 });
    return new THREE.Line(geo, mat);
  }, [fromId, toId]);
  return h('primitive', { object: obj });
}

function FlowParticle({ fromId, toId, offset = 0, speed = 0.35 }) {
  const ref      = useRef();
  const progRef  = useRef(offset);
  const fromVec  = useMemo(() => new THREE.Vector3(...ARCH.find(n => n.id === fromId).pos), [fromId]);
  const toVec    = useMemo(() => new THREE.Vector3(...ARCH.find(n => n.id === toId).pos),   [toId]);
  const color    = ARCH.find(n => n.id === toId).color;

  useFrame((_, dt) => {
    progRef.current = (progRef.current + dt * speed) % 1;
    ref.current.position.lerpVectors(fromVec, toVec, progRef.current);
    const s = 1 + Math.sin(progRef.current * Math.PI) * 0.6;
    ref.current.scale.setScalar(s);
  });

  return h('mesh', { ref },
    h('sphereGeometry', { args: [0.07, 8, 8] }),
    h('meshBasicMaterial', { color })
  );
}

function ArchNode({ node, active }) {
  const ref      = useRef();
  const scaleRef = useRef(new THREE.Vector3(1, 1, 1));
  const label    = useMemo(() => makeLabel(node.label, node.color), [node.label, node.color]);

  useFrame((_, dt) => {
    if (!ref.current) return;
    ref.current.rotation.y += dt * (active ? 1.0 : 0.22);
    ref.current.rotation.x += dt * (active ? 0.35 : 0.08);
    const target = active ? 1.3 : 1.0;
    scaleRef.current.lerp({ x: target, y: target, z: target }, 0.07);
    ref.current.scale.copy(scaleRef.current);
  });

  return h('group', { position: node.pos },
    // Solid icosahedron
    h('mesh', { ref },
      h('icosahedronGeometry', { args: [0.54, 1] }),
      h('meshPhongMaterial', {
        color: node.color,
        emissive: node.color,
        emissiveIntensity: active ? 0.6 : 0.2,
        shininess: 80,
      })
    ),
    // Wireframe overlay for a "holographic" tech look
    h('mesh', null,
      h('icosahedronGeometry', { args: [0.58, 1] }),
      h('meshBasicMaterial', { color: node.color, wireframe: true, transparent: true, opacity: active ? 0.55 : 0.2 })
    ),
    // Outer glow ring
    active && h('mesh', { rotation: [Math.PI / 2, 0, 0] },
      h('torusGeometry', { args: [0.82, 0.04, 8, 48] }),
      h('meshBasicMaterial', { color: node.color, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending })
    ),
    // Floating label
    h('primitive', { object: label, position: [0, 1.1, 0] })
  );
}

// Camera tour controller — lives inside Canvas
function ArchCamera({ tourActive, activeIdx, onAdvance }) {
  const { camera } = useThree();
  const elapsed    = useRef(0);
  const DWELL      = 3.2; // seconds per node

  useFrame((_, dt) => {
    if (!tourActive) return;
    elapsed.current += dt;
    if (elapsed.current > DWELL) {
      elapsed.current = 0;
      onAdvance();
    }
    const node   = ARCH[activeIdx];
    const target = new THREE.Vector3(node.pos[0], node.pos[1] + 0.4, node.pos[2] + 3.8);
    camera.position.lerp(target, 0.035);
    camera.lookAt(node.pos[0], node.pos[1], node.pos[2]);
  });
  return null;
}

function ArchScene({ onNodeChange, tourActive }) {
  const [activeIdx, setActiveIdx] = useState(0);

  const advance = () => {
    setActiveIdx(prev => {
      const next = (prev + 1) % ARCH.length;
      onNodeChange(ARCH[next]);
      return next;
    });
  };

  return h(React.Fragment, null,
    h('ambientLight',     { intensity: 0.35 }),
    h('directionalLight', { position: [0, 8, 6], intensity: 1.0 }),
    h('pointLight',       { position: [0, 0, 4], intensity: 0.6, color: '#4488ff' }),
    h('gridHelper',       { args: [18, 18, '#1a2a3a', '#0d1a24'] }),

    // Nodes
    ...ARCH.map((node, i) =>
      h(ArchNode, { key: node.id, node, active: i === activeIdx })
    ),

    // Edges
    ...ARCH_EDGES.map(([f, t], i) => h(ArchEdge, { key: i, fromId: f, toId: t })),

    // Flow particles (3 per edge, staggered)
    ...ARCH_EDGES.flatMap(([f, t], i) =>
      [0, 0.33, 0.66].map((off, j) =>
        h(FlowParticle, { key: `${i}-${j}`, fromId: f, toId: t, offset: off, speed: 0.3 + i * 0.07 })
      )
    ),

    h(ArchCamera, { tourActive, activeIdx, onAdvance: advance }),
    !tourActive && h(OrbitalControls, { minDist: 2, maxDist: 16 })
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCENE 3: DATACENTER FLYTHROUGH
// ─────────────────────────────────────────────────────────────────────────────

function ServerRack({ pos }) {
  // Slight flicker on the LED panel per rack (seeded random, stable across renders)
  const seed = useMemo(() => Math.random(), []);
  const ledRef = useRef();
  useFrame((state) => {
    if (ledRef.current) {
      ledRef.current.material.opacity = 0.12 + Math.abs(Math.sin(state.clock.elapsedTime * 0.7 + seed * 10)) * 0.18;
    }
  });
  return h('group', { position: pos },
    // Rack chassis
    h('mesh', null,
      h('boxGeometry', { args: [0.82, 2.5, 0.55] }),
      h('meshPhongMaterial', { color: '#0d0d1a', shininess: 50 })
    ),
    // Rack door detail
    h('mesh', { position: [0, 0, 0.28] },
      h('boxGeometry', { args: [0.75, 2.4, 0.04] }),
      h('meshPhongMaterial', { color: '#15152a', shininess: 30 })
    ),
    // LED activity strip
    h('mesh', { ref: ledRef, position: [0.35, 0, 0.29] },
      h('boxGeometry', { args: [0.03, 2.4, 0.02] }),
      h('meshBasicMaterial', { color: '#0040ff', transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending })
    ),
    // Status LED row
    ...[0.8, 0.3, -0.2, -0.7].map((y, i) =>
      h('mesh', { key: i, position: [-0.3, y, 0.3] },
        h('sphereGeometry', { args: [0.025, 6, 6] }),
        h('meshBasicMaterial', { color: i === 1 ? '#ff4400' : '#00ff88', blending: THREE.AdditiveBlending })
      )
    )
  );
}

function CableRun({ from, to, color }) {
  const obj = useMemo(() => {
    const pts   = [new THREE.Vector3(...from), new THREE.Vector3(...to)];
    const mid   = pts[0].clone().add(pts[1]).multiplyScalar(0.5);
    mid.y       += 0.35 + Math.random() * 0.25;
    const curve = new THREE.QuadraticBezierCurve3(pts[0], mid, pts[1]);
    const geo   = new THREE.TubeGeometry(curve, 16, 0.018, 6, false);
    const mat   = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.45, shininess: 40 });
    return new THREE.Mesh(geo, mat);
  }, []);
  return h('primitive', { object: obj });
}

function DatacenterFly({ titleRef }) {
  const { camera } = useThree();
  const t          = useRef(0);
  const DURATION   = 16;

  function ease(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

  useFrame((_, dt) => {
    t.current = Math.min(t.current + dt / DURATION, 1);
    const p = ease(t.current);
    // Fly from z=20 (aisle entrance) toward z=-10 (end wall)
    camera.position.set(
      Math.sin(p * Math.PI * 1.5) * 0.3,  // gentle side sway
      1.6 + Math.sin(p * Math.PI) * 0.25,  // gentle rise and settle
      THREE.MathUtils.lerp(20, -9.5, p)
    );
    camera.lookAt(0, 1.2, camera.position.z - 15);

    // Drive title overlay opacity directly (no React re-render)
    // Start fading in at p=0.65 (camera still moving) so there's no dead-air pause
    if (titleRef?.current) {
      const opacity = Math.max(0, Math.min(1, (p - 0.65) * 5.0));
      titleRef.current.style.opacity = opacity.toString();
    }
  });
  return null;
}

function DatacenterScene({ cfTitle, titleRef }) {
  const racks = useMemo(() => {
    const out = [];
    for (let row = 0; row < 10; row++) {
      for (const side of [-1.8, 1.8]) {
        out.push({ pos: [side, 0, row * -2.8 + 12], key: `${row}-${side}` });
      }
    }
    return out;
  }, []);

  const cables = useMemo(() => {
    const colors = ['#22c55e','#3b82f6','#f59e0b','#ef4444','#a855f7','#14b8a6','#f97316','#06b6d4'];
    const out    = [];
    for (let i = 0; i < 9; i++) {
      out.push({
        from:  [-1.4, 2.0,  i * -2.8 + 12],
        to:    [ 1.4, 2.0, (i + 1) * -2.8 + 12],
        color: colors[i % colors.length],
        key: `c${i}`,
      });
      // cross-aisle drops
      out.push({
        from: [-1.4, 1.85, i * -2.8 + 11],
        to:   [-1.4, 1.2,  i * -2.8 + 11],
        color: colors[(i + 3) % colors.length],
        key: `d${i}`,
      });
    }
    return out;
  }, []);

  return h(React.Fragment, null,
    h('ambientLight', { intensity: 0.08 }),
    h('pointLight', { position: [ 0, 2.5,  15], intensity: 3.0, color: '#aaccff', distance: 12, decay: 2 }),
    h('pointLight', { position: [ 0, 2.5,   0], intensity: 3.0, color: '#aaccff', distance: 12, decay: 2 }),
    h('pointLight', { position: [ 0, 2.5, -10], intensity: 3.0, color: '#8899dd', distance: 12, decay: 2 }),
    // End wall glow
    h('pointLight', { position: [ 0, 1.5, -13], intensity: 2.5, color: '#4466ff', distance: 6, decay: 2 }),

    // Floor
    h('mesh', { position: [0, -1.26, 0], rotation: [-Math.PI / 2, 0, 0] },
      h('planeGeometry', { args: [7, 50] }),
      h('meshPhongMaterial', { color: '#080810', shininess: 120 })
    ),
    // Ceiling
    h('mesh', { position: [0, 3.3, 0], rotation: [Math.PI / 2, 0, 0] },
      h('planeGeometry', { args: [7, 50] }),
      h('meshPhongMaterial', { color: '#0a0a16' })
    ),
    // Left wall
    h('mesh', { position: [-3.2, 1, 0] },
      h('planeGeometry', { args: [50, 6] }),
      h('meshPhongMaterial', { color: '#080812', side: THREE.BackSide })
    ),
    // Right wall
    h('mesh', { position: [3.2, 1, 0], rotation: [0, Math.PI, 0] },
      h('planeGeometry', { args: [50, 6] }),
      h('meshPhongMaterial', { color: '#080812', side: THREE.BackSide })
    ),
    // Overhead cable tray — structural channel
    h('mesh', { position: [0, 2.15, 0] },
      h('boxGeometry', { args: [0.9, 0.08, 50] }),
      h('meshPhongMaterial', { color: '#111122' })
    ),

    // End wall — LED display
    h('mesh', { position: [0, 1.2, -14.5] },
      h('planeGeometry', { args: [5.5, 3.2] }),
      h('meshPhongMaterial', { color: '#001022', emissive: '#001033', emissiveIntensity: 1.0 })
    ),
    // Display border
    h('mesh', { position: [0, 1.2, -14.4] },
      h('planeGeometry', { args: [5.7, 3.4] }),
      h('meshBasicMaterial', { color: '#4466ff', transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending })
    ),

    // Racks
    ...racks.map(r => h(ServerRack, { key: r.key, pos: r.pos })),

    // Cables
    ...cables.map(c => h(CableRun, { key: c.key, from: c.from, to: c.to, color: c.color })),

    // Fly camera
    h(DatacenterFly, { titleRef })
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
const SCENES = [
  { id: 'globe', label: '🌍 Globe',          footer: 'AEM content delivery network — six global data centers, real-time replication arcs.' },
  { id: 'arch',  label: '🔗 Architecture',   footer: 'AEM authoring pipeline — click Play to walk through Author → Publish → GraphQL → CDN → SPA.' },
  { id: 'dc',    label: '🖥 Datacenter',     footer: 'Flythrough of server infrastructure — watch for your AEM-authored title on the end wall.' },
];

const CAM = {
  globe: { position: [0, 0.8, 4.8], fov: 52 },
  arch:  { position: [0.5, 2, 10], fov: 58 },
  dc:    { position: [0, 1.6, 20], fov: 68 },
};

function App() {
  const [scene,    setScene]    = useState('globe');
  const [cfTitle,  setCfTitle]  = useState('React Three Fiber · AEM Demo');
  const [cfCta,    setCfCta]    = useState('Get started →');
  const [tourActive, setTour]   = useState(false);
  const [archNode, setArchNode] = useState(ARCH[0]);
  const titleOverlayRef         = useRef();

  // Fetch CF title
  function fetchTitle() {
    fetch(`${GRAPHQL}?_v=${Date.now()}`, { headers: { Accept: 'application/json' } })
      .then(r => r.json())
      .then(d => {
        const item = d?.data?.homeHeroByPath?.item || d;
        if (item?.title) setCfTitle(item.title);
        if (item?.ctaLabel) setCfCta(item.ctaLabel + ' →');
      })
      .catch(() => {});
  }
  useEffect(() => {
    fetchTitle();
    function onUeMsg(e) {
      if (e.data?.type === 'aue:content-patch' || e.data?.type === 'aue:content-update') {
        setTimeout(fetchTitle, 600);
      }
    }
    window.addEventListener('message', onUeMsg);
    return () => window.removeEventListener('message', onUeMsg);
  }, []);

  // Reset tour when leaving arch scene
  useEffect(() => { if (scene !== 'arch') setTour(false); }, [scene]);

  const currentScene = SCENES.find(s => s.id === scene);

  return h('div', { id: 'shell', style: { height: '100vh', display: 'flex', flexDirection: 'column' } },

    // ── Top bar ──────────────────────────────────────────────────────────────
    h('header', { className: 'r3f-bar' },
      h('span', { className: 'r3f-brand' }, '⚛ @react-three/fiber'),
      h('span', { className: 'r3f-sep' }, '·'),
      h('span', { className: 'r3f-sub' }, 'AEM Content Fragments'),
      h('div',  { className: 'r3f-space' }),
      h('nav',  { className: 'scene-tabs' },
        ...SCENES.map(s =>
          h('button', {
              key: s.id, className: `scene-tab ${scene === s.id ? 'active' : ''}`,
              onClick: () => setScene(s.id),
            }, s.label
          )
        )
      ),
      h('div', {
          className: 'cf-badge',
          'data-aue-resource': RES, 'data-aue-prop': 'title',
          'data-aue-type': 'text', 'data-aue-label': 'Page Title',
          title: cfTitle,
        }, cfTitle
      )
    ),

    // ── Canvas area ───────────────────────────────────────────────────────────
    h('div', { className: 'canvas-wrap' },

      h(Canvas, {
          key: scene,
          camera: CAM[scene],
          gl: { antialias: true, alpha: false },
          style: { background: scene === 'globe' ? '#000408' : scene === 'arch' ? '#020d1a' : '#07070f' },
        },
        scene === 'globe' && h(GlobeScene, null),
        scene === 'arch'  && h(ArchScene, {
            tourActive,
            onNodeChange: setArchNode,
          }),
        scene === 'dc' && h(DatacenterScene, {
            cfTitle,
            titleRef: titleOverlayRef,
          })
      ),

      // Globe legend
      scene === 'globe' && h('div', { className: 'globe-legend' },
        ...DCS.map(dc =>
          h('div', { key: dc.label, className: 'globe-legend-row' },
            h('span', { className: 'globe-legend-dot', style: { background: dc.color } }),
            dc.label
          )
        )
      ),

      // Arch: info panel + tour button
      scene === 'arch' && h(React.Fragment, null,
        h('div', { className: 'scene-info' },
          h('div', { className: 'scene-info-label' }, 'AEM Architecture · ' + (tourActive ? 'Auto-tour' : 'Manual')),
          h('div', { className: 'scene-info-title' }, archNode.label),
          h('div', { className: 'scene-info-desc' },  archNode.info)
        ),
        h('button', {
            className: 'tour-btn',
            onClick: () => setTour(t => !t),
          }, tourActive ? '⏸ Pause tour' : '▶ Play walkthrough'
        )
      ),

      // Datacenter: CF title + CTA overlay (opacity driven by ref from useFrame)
      scene === 'dc' && h('div', {
          ref: titleOverlayRef,
          className: 'dc-title-overlay',
        },
        h('div', { className: 'dc-title-label' }, '↓ AEM Content Fragment · title + ctaLabel'),
        h('h1', {
            className: 'dc-title-text',
            'data-aue-resource': RES,
            'data-aue-prop':     'title',
            'data-aue-type':     'text',
            'data-aue-label':    'CF Title',
          }, cfTitle
        ),
        h('button', {
            className: 'dc-cta',
            'data-aue-resource': RES,
            'data-aue-prop':     'ctaLabel',
            'data-aue-type':     'text',
            'data-aue-label':    'CTA Label',
          }, cfCta
        )
      )
    ),

    // ── Footer ─────────────────────────────────────────────────────────────────
    h('footer', { className: 'r3f-footer' },
      h('span', { className: 'dot' }),
      h('span', null, currentScene.footer),
      h('div', { style: { flex: 1 } }),
      h('span', null, 'three.js r160  ·  @react-three/fiber 8.17  ·  AEM GraphQL  ·  EDS cf branch')
    )
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
try {
  createRoot(document.getElementById('root')).render(h(React.StrictMode, null, h(App, null)));
} catch (e) {
  document.getElementById('root').innerHTML =
    `<div style="padding:48px;color:#ff6b6b;font-family:monospace">
      <strong>R3F init error</strong><br/><br/>${e.message}<br/><br/>
      <small style="opacity:.5">Check browser console — likely importmap / ESM resolution issue</small>
    </div>`;
}
</script>
</body>
</html>
